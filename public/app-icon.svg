<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2234"/>
      <stop offset="100%" stop-color="#0f1018"/>
    </linearGradient>
    <radialGradient id="ngMain" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="ngSat" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <filter id="fSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="218" fill="url(#bg)"/>

  <!-- Connector lines -->
  <line x1="512" y1="512" x2="512" y2="245" stroke="#a78bfa" stroke-width="35" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="512" x2="745" y2="645" stroke="#a78bfa" stroke-width="35" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="512" x2="279" y2="645" stroke="#a78bfa" stroke-width="35" stroke-linecap="round" opacity="0.5"/>

  <!-- Satellite nodes -->
  <circle cx="512" cy="245" r="73" fill="url(#ngSat)" opacity="0.85" filter="url(#fSoft)"/>
  <circle cx="745" cy="645" r="73" fill="url(#ngSat)" opacity="0.85" filter="url(#fSoft)"/>
  <circle cx="279" cy="645" r="73" fill="url(#ngSat)" opacity="0.85" filter="url(#fSoft)"/>

  <!-- Hub node -->
  <circle cx="512" cy="512" r="100" fill="url(#ngMain)" filter="url(#fSoft)"/>

  <!-- Specular highlight -->
  <circle cx="480" cy="480" r="32" fill="white" opacity="0.2"/>
</svg>
